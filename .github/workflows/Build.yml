name: Build and Release WebMD

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build WASM
        run: wasm-pack build --target web --release --out-dir dist

      - name: Minify and prepend ASCII art
        run: |
          npm install -g terser

          # art.txt уже есть в репозитории после checkout — используем его напрямую.
          # Prepend art comment to the regular build
          cat art.txt dist/webmd.js > dist/webmd_with_art.js
          mv dist/webmd_with_art.js dist/webmd.js

          # Minified build: terser first, then prepend art
          terser dist/webmd.js --compress --mangle --output dist/webmd.min.temp.js
          cat art.txt dist/webmd.min.temp.js > dist/webmd.min.js
          rm dist/webmd.min.temp.js

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: webmd-release
          path: |
            dist/webmd.js
            dist/webmd.min.js
            dist/webmd_bg.wasm

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/webmd.js
            dist/webmd.min.js
            dist/webmd_bg.wasm
