name: Build and Release WebMD

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest

    # Явно выдаём права — без contents:write action-gh-release не может
    # создать/обновить релиз (по умолчанию GITHUB_TOKEN read-only).
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Build WASM
        run: wasm-pack build --target web --release --out-dir dist

      - name: Minify and prepend ASCII art
        run: |
          npm install -g terser

          # ВАЖНО: сначала минифицируем чистый JS, потом добавляем арт.
          # Если добавить арт раньше — terser упадёт на первом ⣿ символе.

          # 1. Минифицируем оригинальный dist/webmd.js (без арта)
          terser dist/webmd.js --compress --mangle --output dist/webmd.min.js

          # 2. Теперь добавляем арт-комментарий к обоим файлам
          cat art.txt dist/webmd.js     > dist/tmp.js     && mv dist/tmp.js     dist/webmd.js
          cat art.txt dist/webmd.min.js > dist/tmp.min.js && mv dist/tmp.min.js dist/webmd.min.js

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: webmd-release
          path: |
            dist/webmd.js
            dist/webmd.min.js
            dist/webmd_bg.wasm

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/webmd.js
            dist/webmd.min.js
            dist/webmd_bg.wasm
