          */
          EOF

          # Склеиваем арт с базовым JS
          cat art.txt dist/webmd.js > dist/webmd_with_art.js
          mv dist/webmd_with_art.js dist/webmd.js
          
          # Создаем min.js и добавляем к нему арт
          terser dist/webmd.js --compress --mangle > dist/webmd.min.temp.js
          cat art.txt dist/webmd.min.temp.js > dist/webmd.min.js
          rm dist/webmd.min.temp.js

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: webmd-release
          path: |
            dist/webmd.js
            dist/webmd.min.js
            dist/webmd_bg.wasm

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/webmd.js
            dist/webmd.min.js
            dist/webmd_bg.wasm